<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园OA系统 - 登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .login-container {
            width: 400px;
            margin: 100px auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .captcha {
            display: flex;
            gap: 10px;
        }
        .captcha input {
            flex: 1;
        }
        .captcha-code {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 3px;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>校园OA系统</h2>
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="form-group">
            <label for="verifyCode">验证码</label>
            <div class="captcha">
                <input type="text" id="verifyCode" placeholder="请输入验证码">
                <div class="captcha-code" id="captchaCode">5+3=?</div>
                <button type="button" onclick="refreshCaptcha()">刷新</button>
            </div>
        </div>
        <button onclick="login()">登录</button>
    </div>
    <script>
        var captchaNum1 = 5;
        var captchaNum2 = 3;
        var captchaResult = 8;

        function refreshCaptcha() {
            captchaNum1 = Math.floor(Math.random() * 10);
            captchaNum2 = Math.floor(Math.random() * 10);
            captchaResult = captchaNum1 + captchaNum2;
            document.getElementById('captchaCode').innerHTML = captchaNum1 + '+' + captchaNum2 + '=?';
            document.getElementById('verifyCode').value = '';
        }

        function login() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var verifyCode = document.getElementById('verifyCode').value;

            if (parseInt(verifyCode) !== captchaResult) {
                alert('验证码错误');
                refreshCaptcha();
                return;
            }

            if (username === 'admin' && password === '123456') {
                alert('管理员登录成功');
            } else if (username === 'teacher' && password === '123456') {
                alert('教师登录成功');
            } else if (username === 'student' && password === '123456') {
                alert('学生登录成功');
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
