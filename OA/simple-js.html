<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园OA系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-form {
            width: 420px;
            padding: 40px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4a5568;
            font-weight: 600;
        }
        .form-item {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-form">
                <h2>校园OA系统</h2>
                <div class="form-item">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码">
                </div>
                <button class="btn-primary" onclick="login()">登录</button>
            </div>
        </div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === 'admin' && password === '123456') {
                alert('登录成功！');
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
