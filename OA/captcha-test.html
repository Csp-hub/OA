<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .form-item {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 5px;
        }
        .form-input {
            padding: 10px;
            width: 200px;
        }
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-code {
            background-color: #f0f2f5;
            padding: 10px;
            border-radius: 4px;
        }
        .btn {
            padding: 10px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="form-item">
            <label class="form-label">验证码</label>
            <div class="captcha-container">
                <input type="text" v-model="verifyCode" class="form-input" placeholder="请输入验证码">
                <div class="captcha-code">
                    {{ captcha.num1 }} {{ captcha.operator }} {{ captcha.num2 }} = ?
                </div>
                <button class="btn" @click="generateCaptcha">刷新</button>
            </div>
        </div>
        <button class="btn" @click="checkCaptcha">验证</button>
        <div v-if="message" style="margin-top: 20px;">{{ message }}</div>
    </div>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    verifyCode: '',
                    message: '',
                    captcha: {
                        num1: 0,
                        num2: 0,
                        operator: '+',
                        result: 0
                    }
                };
            },
            methods: {
                generateCaptcha() {
                    this.captcha.num1 = Math.floor(Math.random() * 10);
                    this.captcha.num2 = Math.floor(Math.random() * 10);
                    this.captcha.operator = Math.random() > 0.5 ? '+' : '-';
                    if (this.captcha.operator === '+') {
                        this.captcha.result = this.captcha.num1 + this.captcha.num2;
                    } else {
                        if (this.captcha.num1 < this.captcha.num2) {
                            [this.captcha.num1, this.captcha.num2] = [this.captcha.num2, this.captcha.num1];
                        }
                        this.captcha.result = this.captcha.num1 - this.captcha.num2;
                    }
                    this.verifyCode = '';
                    this.message = '';
                },
                checkCaptcha() {
                    if (parseInt(this.verifyCode) === this.captcha.result) {
                        this.message = '验证码正确！';
                    } else {
                        this.message = '验证码错误！';
                    }
                }
            },
            mounted() {
                this.generateCaptcha();
            }
        }).mount('#app');
    </script>
</body>
</html>
